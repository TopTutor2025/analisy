<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articolo — Analisy</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .article-page {
      min-height: 100vh;
      padding-top: calc(var(--nav-h) + 32px);
      padding-bottom: 80px;
    }
    .article-container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 0;
      transition: var(--transition);
    }
    .article-back:hover { color: var(--accent-blue); }
    .article-cat-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: 14px;
    }
    /* Back button nella navbar — solo mobile */
    .article-nav-back {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      white-space: nowrap;
    }
    /* Wrapper riga back+badge — stili base qui così media query può fare display:none */
    .article-back-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    @media (max-width: 768px) {
      .article-nav-back { display: flex; }
      .article-back-row { display: none !important; }
      .article-cat-badge {
        font-size: 0.58rem;
        padding: 2px 7px;
        letter-spacing: 0.06em;
      }
    }
    .article-title {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.22;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .article-subtitle {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.55;
      font-weight: 400;
      margin-bottom: 20px;
    }
    .article-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 14px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .article-meta-author {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .article-meta-divider {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .article-meta-info {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .article-premium-badge {
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(245,200,66,0.12);
      color: #f5c842;
      border: 1px solid rgba(245,200,66,0.3);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .article-hero-img {
      width: 100%;
      height: 360px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 28px;
    }
    .article-abstract {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text-primary);
      font-weight: 500;
      padding: 16px 20px;
      border-left: 3px solid var(--accent-color, var(--accent-blue));
      background: rgba(79,158,255,0.05);
      border-radius: 0 8px 8px 0;
      margin-bottom: 24px;
    }
    .article-body {
      font-size: 0.96rem;
      line-height: 1.88;
      color: var(--text-secondary);
    }
    .article-body p {
      margin-bottom: 18px;
    }
    .article-suggested {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .article-suggested-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .suggested-card {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      transition: var(--transition);
      margin-bottom: 10px;
    }
    .suggested-card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
    .suggested-card img {
      width: 72px; height: 52px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .suggested-card-info { flex: 1; min-width: 0; }
    .suggested-card-cat {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .suggested-card-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article-not-found {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .article-locked {
      text-align: center;
      padding: 48px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 24px;
    }
    /* ── Stats bar ── */
    .article-stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 36px;
      padding: 14px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .article-stat {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .article-stat svg { opacity: 0.6; flex-shrink: 0; }
    .btn-like {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid rgba(232,52,78,0.3);
      background: rgba(232,52,78,0.06);
      color: #e8344e;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-like:hover { background: rgba(232,52,78,0.12); border-color: rgba(232,52,78,0.5); }
    .btn-like:active { transform: scale(0.96); }
    .btn-like.liked {
      background: rgba(232,52,78,0.15);
      border-color: #e8344e;
      color: #e8344e;
    }
    .btn-like .like-heart { transition: transform 0.2s; }
    .btn-like.liked .like-heart { transform: scale(1.25); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="main-navbar">
  <div class="container">
    <div class="navbar-inner">

      <a href="index.html" style="text-decoration:none;">
        <span style="font-family:-apple-system,'SF Pro Display',Inter,sans-serif;font-size:1.35rem;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#e8344e,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">ANALISY</span>
      </a>

      <ul class="navbar-nav">
        <li><a href="index.html#perche-analisy">Perché Analisy</a></li>
        <li><a href="index.html#come-funziona">Come funziona</a></li>
        <li><a href="situation-room.html">Situation Room</a></li>
      </ul>

      <div class="navbar-actions" id="navbar-actions">
        <a href="login.html" class="btn-accedi">Accedi</a>
        <button class="help-btn" title="Aiuto">?</button>
        <a href="situation-room.html" class="btn btn-primary btn-sm">Situation Room</a>
      </div>

      <a href="situation-room.html" class="article-nav-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Situation Room
      </a>

    </div>
  </div>
</nav>

<div class="article-page">
  <div class="article-container" id="article-container">
    <div style="text-align:center;padding:80px 0;color:var(--text-muted);">Caricamento...</div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await AppData.init();
  renderNavbar();

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const all = getArticles();
  const a = all.find(x => String(x.id) === String(id));
  const container = document.getElementById('article-container');

  if (!a) {
    container.innerHTML = `
      <div class="article-not-found">
        <div style="font-size:3rem;margin-bottom:16px;">📄</div>
        <h2 style="margin-bottom:8px;color:var(--text-primary);">Articolo non trovato</h2>
        <p style="margin-bottom:24px;">L'articolo che cerchi non esiste o è stato rimosso.</p>
        <a href="situation-room.html" class="btn btn-primary">← Torna alla Situation Room</a>
      </div>`;
    return;
  }

  const catColors = { geopolitica:'#e8344e', politica:'#4f9eff', business:'#22d47a', tecnologia:'#00c2e0', hotspot:'#06d6a0' };
  const catBgColors = { geopolitica:'rgba(232,52,78,0.12)', politica:'rgba(79,158,255,0.12)', business:'rgba(34,212,122,0.12)', tecnologia:'rgba(0,194,224,0.12)', hotspot:'rgba(6,214,160,0.12)' };
  const color = catColors[a.cat] || '#4f9eff';
  const bgColor = catBgColors[a.cat] || 'rgba(79,158,255,0.12)';

  document.title = a.title + ' — Analisy';

  const isPremium = Auth.isPremium();
  const isLocked = a.premium && !isPremium;

  // ── Traccia visualizzazione (fire & forget) ──
  Api.fn('article-interact', { action: 'view', id: String(a.id) }).catch(() => {});

  // ── Stato like (localStorage per evitare doppio like al reload) ──
  const likedKey = `analisy_liked_${a.id}`;
  let isLiked = localStorage.getItem(likedKey) === '1';
  let currentLikes = a.likes || 0;

  const imgHtml = a.image
    ? `<img src="${a.image}" alt="${a.title}" class="article-hero-img" />`
    : '';

  const suggestedIds = a.suggested ? String(a.suggested).split(',').map(s => s.trim()).filter(Boolean) : [];
  const suggestedHtml = suggestedIds.length ? `
    <div class="article-suggested">
      <div class="article-suggested-title">Articoli correlati</div>
      ${suggestedIds.map(sid => {
        const sa = all.find(x => String(x.id) === String(sid));
        if (!sa) return '';
        const sc = catColors[sa.cat] || '#4f9eff';
        return `<a href="article.html?id=${sa.id}" class="suggested-card">
          ${sa.image ? `<img src="${sa.image}" alt="${sa.title}" />` : `<div style="width:72px;height:52px;border-radius:6px;background:linear-gradient(135deg,#0a1020,#0f1a30);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">📰</div>`}
          <div class="suggested-card-info">
            <div class="suggested-card-cat" style="color:${sc};">${sa.cat_label || sa.catLabel || sa.cat}</div>
            <div class="suggested-card-title">${sa.title}</div>
          </div>
        </a>`;
      }).join('')}
    </div>` : '';

  const bodyHtml = isLocked
    ? `<div class="article-locked">
        <div style="font-size:2rem;margin-bottom:12px;">🔒</div>
        <h3 style="margin-bottom:8px;color:var(--text-primary);">Contenuto riservato agli abbonati</h3>
        <p style="font-size:0.88rem;color:var(--text-secondary);margin-bottom:20px;">Questo articolo è disponibile solo per gli abbonati Premium e Pro.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="register.html" class="btn btn-primary">Abbonati ora</a>
          <a href="situation-room.html" class="btn btn-outline">← Situation Room</a>
        </div>
      </div>`
    : `<div class="article-body">${(a.content || '').split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('')}</div>`;

  const fmtNum = n => (n||0) >= 1000 ? ((n||0)/1000).toFixed(1).replace('.',',') + 'k' : String(n||0);

  const statsBar = `
    <div class="article-stats-bar">
      <div class="article-stat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span id="art-views-count">${fmtNum((a.views||0) + 1)}</span> visualizzazioni
      </div>
      <button class="btn-like${isLiked ? ' liked' : ''}" id="btn-like" onclick="toggleLike()">
        <svg class="like-heart" width="15" height="15" viewBox="0 0 24 24"
          fill="${isLiked ? '#e8344e' : 'none'}" stroke="#e8344e" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span id="art-likes-count">${fmtNum(currentLikes)}</span>
      </button>
    </div>`;

  container.innerHTML = `
    <div class="article-back-row">
      <a href="situation-room.html" class="article-back" style="margin-bottom:0;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Torna alla Situation Room
      </a>
      <span class="article-cat-badge" style="color:${color};background:${bgColor};">${a.cat_label || a.catLabel || a.cat}</span>
    </div>

    <h1 class="article-title">${a.title}</h1>
    ${a.subtitle ? `<p class="article-subtitle">${a.subtitle}</p>` : ''}

    <div class="article-meta">
      ${a.author ? `<span class="article-meta-author">${a.author}</span><span class="article-meta-divider"></span>` : ''}
      ${a.published_at ? `<span class="article-meta-info">${new Date(a.published_at).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})}</span>` : ''}
      ${a.read_time ? `<span class="article-meta-divider"></span><span class="article-meta-info">${a.read_time} di lettura</span>` : ''}
      ${a.premium ? `<span class="article-premium-badge">PREMIUM</span>` : ''}
    </div>

    ${imgHtml}

    ${a.excerpt ? `<p class="article-abstract" style="--accent-color:${color};">${a.excerpt}</p>` : ''}

    ${bodyHtml}

    ${!isLocked ? statsBar : ''}

    ${!isLocked ? suggestedHtml : ''}
  `;

  // ── Toggle like ──
  window.toggleLike = async function() {
    const btn = document.getElementById('btn-like');
    const countEl = document.getElementById('art-likes-count');
    if (!btn || !countEl) return;
    btn.disabled = true;
    try {
      if (isLiked) {
        const res = await Api.fn('article-interact', { action: 'unlike', id: String(a.id) });
        isLiked = false;
        localStorage.removeItem(likedKey);
        currentLikes = res.likes ?? Math.max(0, currentLikes - 1);
      } else {
        const res = await Api.fn('article-interact', { action: 'like', id: String(a.id) });
        isLiked = true;
        localStorage.setItem(likedKey, '1');
        currentLikes = res.likes ?? currentLikes + 1;
      }
      countEl.textContent = fmtNum(currentLikes);
      btn.classList.toggle('liked', isLiked);
      const heart = btn.querySelector('.like-heart');
      if (heart) heart.setAttribute('fill', isLiked ? '#e8344e' : 'none');
    } catch(e) { /* silenzioso */ }
    btn.disabled = false;
  };
});
</script>
<script src="js/cookie-banner.js"></script>
</body>
</html>
