<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articolo — Analisy</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .article-page {
      min-height: 100vh;
      padding-top: calc(var(--nav-h) + 32px);
      padding-bottom: 80px;
    }
    .article-container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 28px;
      transition: var(--transition);
    }
    .article-back:hover { color: var(--accent-blue); }
    .article-cat-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: 14px;
    }
    .article-title {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.22;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .article-subtitle {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.55;
      font-weight: 400;
      margin-bottom: 20px;
    }
    .article-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 14px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .article-meta-author {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .article-meta-divider {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .article-meta-info {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .article-premium-badge {
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(245,200,66,0.12);
      color: #f5c842;
      border: 1px solid rgba(245,200,66,0.3);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .article-hero-img {
      width: 100%;
      height: 360px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 28px;
    }
    .article-abstract {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text-primary);
      font-weight: 500;
      padding: 16px 20px;
      border-left: 3px solid var(--accent-color, var(--accent-blue));
      background: rgba(79,158,255,0.05);
      border-radius: 0 8px 8px 0;
      margin-bottom: 24px;
    }
    .article-body {
      font-size: 0.96rem;
      line-height: 1.88;
      color: var(--text-secondary);
    }
    .article-body p {
      margin-bottom: 18px;
    }
    .article-suggested {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .article-suggested-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .suggested-card {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      transition: var(--transition);
      margin-bottom: 10px;
    }
    .suggested-card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
    .suggested-card img {
      width: 72px; height: 52px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .suggested-card-info { flex: 1; min-width: 0; }
    .suggested-card-cat {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .suggested-card-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article-not-found {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .article-locked {
      text-align: center;
      padding: 48px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 24px;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="main-navbar">
  <div class="container">
    <div class="navbar-inner">

      <a href="index.html" class="navbar-logo">
        <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 26" width="22" height="20"><line x1="7" y1="1" x2="7" y2="5" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round"/><rect x="3" y="5" width="8" height="13" rx="1.5" fill="white"/><line x1="7" y1="18" x2="7" y2="22" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round"/><line x1="21" y1="2" x2="21" y2="7" stroke="#e8344e" stroke-width="2" stroke-linecap="round"/><rect x="17" y="7" width="8" height="9" rx="1.5" fill="#e8344e"/><line x1="21" y1="16" x2="21" y2="22" stroke="#e8344e" stroke-width="2" stroke-linecap="round"/></svg></div>
        analisy
      </a>

      <ul class="navbar-nav">
        <li><a href="index.html#perche-analisy">Perché Analisy</a></li>
        <li><a href="index.html#come-funziona">Come funziona</a></li>
        <li><a href="situation-room.html">Situation Room</a></li>
      </ul>

      <div class="navbar-actions" id="navbar-actions">
        <a href="login.html" class="btn-accedi">Accedi</a>
        <button class="help-btn" title="Aiuto">?</button>
        <a href="situation-room.html" class="btn btn-primary btn-sm">Situation Room</a>
      </div>

    </div>
  </div>
</nav>

<div class="article-page">
  <div class="article-container" id="article-container">
    <div style="text-align:center;padding:80px 0;color:var(--text-muted);">Caricamento...</div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await AppData.init();
  renderNavbar();

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const all = getArticles();
  const a = all.find(x => String(x.id) === String(id));
  const container = document.getElementById('article-container');

  if (!a) {
    container.innerHTML = `
      <div class="article-not-found">
        <div style="font-size:3rem;margin-bottom:16px;">📄</div>
        <h2 style="margin-bottom:8px;color:var(--text-primary);">Articolo non trovato</h2>
        <p style="margin-bottom:24px;">L'articolo che cerchi non esiste o è stato rimosso.</p>
        <a href="situation-room.html" class="btn btn-primary">← Torna alla Situation Room</a>
      </div>`;
    return;
  }

  const catColors = { geopolitica:'#e8344e', politica:'#4f9eff', business:'#22d47a', tecnologia:'#00c2e0' };
  const catBgColors = { geopolitica:'rgba(232,52,78,0.12)', politica:'rgba(79,158,255,0.12)', business:'rgba(34,212,122,0.12)', tecnologia:'rgba(0,194,224,0.12)' };
  const color = catColors[a.cat] || '#4f9eff';
  const bgColor = catBgColors[a.cat] || 'rgba(79,158,255,0.12)';

  document.title = a.title + ' — Analisy';

  const isPremium = Auth.isPremium();
  const isLocked = a.premium && !isPremium;

  const imgHtml = a.image
    ? `<img src="${a.image}" alt="${a.title}" class="article-hero-img" />`
    : '';

  const suggestedIds = a.suggested ? String(a.suggested).split(',').map(s => s.trim()).filter(Boolean) : [];
  const suggestedHtml = suggestedIds.length ? `
    <div class="article-suggested">
      <div class="article-suggested-title">Articoli correlati</div>
      ${suggestedIds.map(sid => {
        const sa = all.find(x => String(x.id) === String(sid));
        if (!sa) return '';
        const sc = catColors[sa.cat] || '#4f9eff';
        return `<a href="article.html?id=${sa.id}" class="suggested-card">
          ${sa.image ? `<img src="${sa.image}" alt="${sa.title}" />` : `<div style="width:72px;height:52px;border-radius:6px;background:linear-gradient(135deg,#0a1020,#0f1a30);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">📰</div>`}
          <div class="suggested-card-info">
            <div class="suggested-card-cat" style="color:${sc};">${sa.catLabel || sa.cat}</div>
            <div class="suggested-card-title">${sa.title}</div>
          </div>
        </a>`;
      }).join('')}
    </div>` : '';

  const bodyHtml = isLocked
    ? `<div class="article-locked">
        <div style="font-size:2rem;margin-bottom:12px;">🔒</div>
        <h3 style="margin-bottom:8px;color:var(--text-primary);">Contenuto riservato agli abbonati</h3>
        <p style="font-size:0.88rem;color:var(--text-secondary);margin-bottom:20px;">Questo articolo è disponibile solo per gli abbonati Premium e Pro.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="register.html" class="btn btn-primary">Abbonati ora</a>
          <a href="situation-room.html" class="btn btn-outline">← Situation Room</a>
        </div>
      </div>`
    : `<div class="article-body">${(a.body || '').split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('')}</div>`;

  container.innerHTML = `
    <a href="situation-room.html" class="article-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Torna alla Situation Room
    </a>

    <span class="article-cat-badge" style="color:${color};background:${bgColor};">${a.catLabel || a.cat}</span>

    <h1 class="article-title">${a.title}</h1>
    ${a.subtitle ? `<p class="article-subtitle">${a.subtitle}</p>` : ''}

    <div class="article-meta">
      ${a.author ? `<span class="article-meta-author">${a.author}</span><span class="article-meta-divider"></span>` : ''}
      ${a.date   ? `<span class="article-meta-info">${a.date}</span>` : ''}
      ${a.readTime ? `<span class="article-meta-divider"></span><span class="article-meta-info">${a.readTime} di lettura</span>` : ''}
      ${a.premium ? `<span class="article-premium-badge">PREMIUM</span>` : ''}
    </div>

    ${imgHtml}

    ${a.abstract ? `<p class="article-abstract" style="--accent-color:${color};">${a.abstract}</p>` : ''}

    ${bodyHtml}

    ${!isLocked ? suggestedHtml : ''}
  `;
});
</script>
<script src="js/cookie-banner.js"></script>
</body>
</html>
