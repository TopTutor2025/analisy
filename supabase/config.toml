# Supabase local development config
# Documentazione: https://supabase.com/docs/guides/local-development

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
# URL del sito (aggiorna con il tuo dominio GitHub Pages)
site_url = "https://toptutor2025.github.io/analisy"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:5500", "https://toptutor2025.github.io"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # Imposta true in produzione

[functions]
# Tutte le Edge Functions nella cartella functions/
