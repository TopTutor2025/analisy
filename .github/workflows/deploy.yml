name: Deploy to GitHub Pages + Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. Deploy frontend su GitHub Pages ──────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Carica la root del progetto (tutti i file HTML/CSS/JS)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── 2. Deploy Edge Functions su Supabase ────────────────
  deploy-functions:
    runs-on: ubuntu-latest
    needs: []   # esegue in parallelo al frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy auth-me        --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy articles       --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy podcasts       --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy citycams       --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy map-events     --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy map-resources  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy ai-run         --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy ai-articles    --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy admin-users    --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy forum-posts    --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy forum-replies  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy forum-reports   --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy citycams-save  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
